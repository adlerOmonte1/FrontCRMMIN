<h1 class="h3 mb-3">{{ editando ? 'Editar' : 'Nuevo' }} inventario</h1>

@if (cargandoOpciones() || cargandoRegistro()) {
  <div class="d-flex align-items-center gap-2 text-body-secondary">
    <div class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></div>
    <span>Cargando datos del formulario…</span>
  </div>
} @else {
  <form [formGroup]="formulario" (ngSubmit)="guardar()" class="row g-3" style="max-width: 40rem">
    <div class="col-12">
      <label class="form-label" for="inventario-encargado">Encargado</label>
      <select id="inventario-encargado" class="form-select" formControlName="encargado">
        <option value="" disabled>Selecciona un encargado…</option>
        @for (opcion of encargados(); track opcion.id) {
          <option [value]="opcion.id">{{ opcion.label }}</option>
        }
      </select>
    </div>

    <div class="col-12">
      <label class="form-label" for="inventario-lugar">Lugar</label>
      <input type="text" id="inventario-lugar" class="form-control" formControlName="lugar" />
    </div>

    <div class="col-12">
      <label class="form-label" for="inventario-descripcion">Descripción</label>
      <input type="text" id="inventario-descripcion" class="form-control" formControlName="descripcion" />
    </div>

    @if (!editando) {
      <div class="col-12">
        <div class="form-text">
          Después de guardar, agregá cada máquina o insumo contado desde "Ver detalles".
        </div>
      </div>
    }

    @if (error()) {
      <div class="col-12">
        <div class="alert alert-danger mb-0" role="alert">{{ error() }}</div>
      </div>
    }

    <div class="col-12 d-flex gap-2">
      <button type="submit" class="btn btn-primary" [disabled]="guardando()">
        {{ guardando() ? 'Guardando…' : 'Guardar' }}
      </button>
      <a routerLink="/inventarios" class="btn btn-outline-secondary">Cancelar</a>
    </div>
  </form>
}
