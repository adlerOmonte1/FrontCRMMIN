<section class="detalle-requerimiento-form">
  <h1>{{ editando ? 'Editar' : 'Nuevo' }} ítem de requerimiento</h1>

  @if (cargandoOpciones() || cargandoRegistro()) {
    <p>Cargando datos del formulario…</p>
  } @else {
    <form class="formulario" [formGroup]="formulario" (ngSubmit)="guardar()">
      <label>
        Requerimiento
        <select formControlName="requerimiento">
          <option value="" disabled>Selecciona un requerimiento…</option>
          @for (opcion of requerimientos(); track opcion.id) {
            <option [value]="opcion.id">{{ opcion.label }}</option>
          }
        </select>
      </label>

      <label>
        Nombre del ítem
        <input type="text" formControlName="nombre" />
      </label>

      <label>
        Cantidad
        <input type="text" formControlName="cantidad" />
      </label>

      <label>
        Tipo
        <select formControlName="tipo">
          @for (opcion of tipos; track opcion.valor) {
            <option [value]="opcion.valor">{{ opcion.etiqueta }}</option>
          }
        </select>
      </label>

      @if (error()) {
        <p class="mensaje-error">{{ error() }}</p>
      }

      <div class="formulario__acciones">
        <a routerLink="/detalles-requerimiento" class="boton">Cancelar</a>
        <button type="submit" class="boton boton--primario" [disabled]="guardando()">
          {{ guardando() ? 'Guardando…' : 'Guardar' }}
        </button>
      </div>
    </form>
  }
</section>
