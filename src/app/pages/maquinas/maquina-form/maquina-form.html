<h1 class="h3 mb-3">{{ editando ? 'Editar' : 'Nueva' }} máquina</h1>

@if (cargandoRegistro()) {
  <div class="d-flex align-items-center gap-2 text-body-secondary">
    <div class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></div>
    <span>Cargando máquina…</span>
  </div>
} @else {
  <form [formGroup]="formulario" (ngSubmit)="guardar()" class="row g-3" style="max-width: 40rem">
    <div class="col-12">
      <label class="form-label" for="maquina-nombre">Nombre</label>
      <input type="text" id="maquina-nombre" class="form-control" formControlName="nombre" />
    </div>

    <div class="col-md-6">
      <label class="form-label" for="maquina-marca">Marca (opcional)</label>
      <input type="text" id="maquina-marca" class="form-control" formControlName="marca" />
    </div>

    <div class="col-md-6">
      <label class="form-label" for="maquina-nro_serie">N° de serie (opcional)</label>
      <input type="text" id="maquina-nro_serie" class="form-control" formControlName="nro_serie" />
    </div>

    @if (error()) {
      <div class="col-12">
        <div class="alert alert-danger mb-0" role="alert">{{ error() }}</div>
      </div>
    }

    <div class="col-12 d-flex gap-2">
      <button type="submit" class="btn btn-primary" [disabled]="guardando()">
        {{ guardando() ? 'Guardando…' : 'Guardar' }}
      </button>
      <a routerLink="/maquinas" class="btn btn-outline-secondary">Cancelar</a>
    </div>
  </form>
}
